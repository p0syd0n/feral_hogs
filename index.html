<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hog Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: absolute; top: 16px; left: 16px;
      color: rgba(255,255,255,0.55);
      font-family: monospace; font-size: 13px;
      pointer-events: none;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="info">
    Left drag: rotate &nbsp;|&nbsp; Right drag: pan &nbsp;|&nbsp; Scroll: zoom<br>
    Hogs: <span id="hogCount">0</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/controls/OrbitControls.js"></script>

  <script>
    // ─────────────────────────────────────────────────────────────
    // CONSTANTS  (all-caps = intentionally tunable)
    // ─────────────────────────────────────────────────────────────

    // Grid / world
    const SEGMENTS_X      = 100;
    const SEGMENTS_Y      = 100;
    const PLANE_WIDTH     = 10;
    const PLANE_HEIGHT    = 10;

    // Time
    const DAY_DURATION    = 2000;   // ms — one real second = one simulated day
    const TARGET_FPS      = 30;

    // Population
    const INITIAL_HOGS    = 150;
    const MAX_HOGS        = 600;    // hard cap — prevents runaway lag

    // Movement
    const BASE_SPEED      = 30;      // grid cells / day at fatness = 0
    const NEAREST_N       = 6;      // pack size (flocking cohesion)
    const CROWD_RADIUS    = 8;      // grid-cell radius for overcrowding check

    // Direction weights
    const GROUP_WEIGHT    = 1.0;    // toward pack centroid
    const AGRI_WEIGHT     = 1.5;    // toward higher agriculture (scales with hunger)
    const AVOID_WEIGHT    = 2.0;    // away from toAvoid hotspots
    const CROWD_WEIGHT    = 3.5;    // away from overcrowded neighbours

    // Wander (random direction impulse)
    const WANDER_CHANCE   = 0.1;   // per direction-calc step, P(large wander)
    const WANDER_LOW      = 0.15;   // max weight in quiet case (negligible noise)
    const WANDER_HIGH_MIN = 2.0;    // triggered wander weight range …
    const WANDER_HIGH_MAX = 10.0;    // … can overpower all other components

    // Fat / vitals
    const MAX_FAT_CHANGE  = 0.08;   // max fat gained or lost per day

    // Demography: birth:death = MAX_BIRTH_DEATH_RATIO at peak agriculture
    //   At ideal conditions only natural death occurs →
    //   ratio = BIRTH_RATE / NATURAL_DEATH_RATE  →  N.D.R. = B.R. / ratio
    const MAX_BIRTH_DEATH_RATIO = 1.05;
    const BIRTH_RATE            = 1 / 12;                           // reproductions / day
    const NATURAL_DEATH_RATE    = BIRTH_RATE / MAX_BIRTH_DEATH_RATIO; // ≈ 0.0794 / day

    // ─────────────────────────────────────────────────────────────
    // GLOBALS
    // ─────────────────────────────────────────────────────────────
    let hogPositions;        // [col][row] → Hog[]   (spatial index)
    let agriculture;         // [col][row] → float 0–1
    let toAvoid;             // [col][row] → float 0–1  (empty for now)
    let agGradX, agGradY;    // precomputed central-difference gradients of agriculture
    let hogs = [];

    // ─────────────────────────────────────────────────────────────
    // HOG CLASS
    // ─────────────────────────────────────────────────────────────
    class Hog {
      constructor(position) {
        this.col       = position.x;
        this.row       = position.y;
        this.fatness   = 0.35 + Math.random() * 0.35;  // initial fat 0.35–0.70
        this.direction = { dx: 0, dy: 0 };
        const c = Math.round(this.col), r = Math.round(this.row);
        hogPositions[c][r].push(this);
        hogs.push(this);
      }

      calculateDirection() {
        const c = Math.round(this.col);
        const r = Math.round(this.row);

        // ── Agriculture gradient (precomputed, no per-call allocation) ──
        const agdx = agGradX[c][r];
        const agdy = agGradY[c][r];
        const agMag = Math.hypot(agdx, agdy) || 1;

        // ── Avoidance gradient (away from toAvoid) ──
        const avdx = -(toAvoid[Math.min(c+1,SEGMENTS_X)][r] - toAvoid[Math.max(c-1,0)][r]);
        const avdy = -(toAvoid[c][Math.min(r+1,SEGMENTS_Y)] - toAvoid[c][Math.max(r-1,0)]);
        const avMag = Math.hypot(avdx, avdy) || 1;

        // ── Sort neighbours once; reuse for pack cohesion AND crowd dispersal ──
        const others = [];
        for (let i = 0; i < hogs.length; i++) {
          const h = hogs[i];
          if (h === this) continue;
          const dx = h.col - this.col;
          const dy = h.row - this.row;
          others.push({ dx, dy, dist: Math.hypot(dx, dy) });
        }
        others.sort((a, b) => a.dist - b.dist);

        // Pack (nearest NEAREST_N) → go toward their average unit direction
        let gdx = 0, gdy = 0;
        const packSize = Math.min(NEAREST_N, others.length);
        for (let i = 0; i < packSize; i++) {
          const { dx, dy, dist } = others[i];
          const m = dist || 1;
          gdx += dx / m;
          gdy += dy / m;
        }
        const gMag = Math.hypot(gdx, gdy) || 1;
        const gx = packSize ? gdx / gMag : 0;
        const gy = packSize ? gdy / gMag : 0;

        // Crowd (beyond pack, within CROWD_RADIUS) → flee opposite their centroid
        // Because the list is sorted, we can break early once dist > CROWD_RADIUS
        let cdx = 0, cdy = 0, crowdCount = 0;
        for (let i = NEAREST_N; i < others.length; i++) {
          const { dx, dy, dist } = others[i];
          if (dist > CROWD_RADIUS) break;
          const m = dist || 1;
          cdx -= dx / m;   // reversed: push *away*
          cdy -= dy / m;
          crowdCount++;
        }
        const cMag = Math.hypot(cdx, cdy) || 1;
        const cx = crowdCount ? cdx / cMag : 0;
        const cy = crowdCount ? cdy / cMag : 0;
        // Weight scales with crowding severity, capped so it never goes infinite
        const crowdStrength = Math.min(crowdCount / (NEAREST_N + 1), 3.0);

        // ── Wander (random impulse) ──
        const wanderAngle = Math.random() * Math.PI * 2;
        const wanderW = Math.random() < WANDER_CHANCE
          ? WANDER_HIGH_MIN + Math.random() * (WANDER_HIGH_MAX - WANDER_HIGH_MIN)
          : Math.random() * WANDER_LOW;

        // ── Weighted sum ──
        // Hungrier hogs weight food more (fatness=0 → 2× AGRI_WEIGHT; fatness=1 → 1× AGRI_WEIGHT)
        const agriW  = AGRI_WEIGHT * (2 - this.fatness);
        const groupW = GROUP_WEIGHT;
        const avoidW = AVOID_WEIGHT * toAvoid[c][r];   // 0 when toAvoid is empty
        const crowdW = CROWD_WEIGHT * crowdStrength;

        const dx = gx * groupW
                 + (agdx / agMag) * agriW
                 + (avdx / avMag) * avoidW
                 + cx * crowdW
                 + Math.cos(wanderAngle) * wanderW;
        const dy = gy * groupW
                 + (agdy / agMag) * agriW
                 + (avdy / avMag) * avoidW
                 + cy * crowdW
                 + Math.sin(wanderAngle) * wanderW;

        const mag = Math.hypot(dx, dy) || 1;
        this.direction = { dx: dx / mag, dy: dy / mag };
      }

      move(deltaDay) {
        // Fatter hogs move slower (half speed at fatness = 1)
        const speed = BASE_SPEED * (1 - this.fatness * 0.5) * deltaDay;
        const oldC = Math.round(this.col);
        const oldR = Math.round(this.row);

        this.col = Math.max(0, Math.min(SEGMENTS_X, this.col + this.direction.dx * speed));
        this.row = Math.max(0, Math.min(SEGMENTS_Y, this.row + this.direction.dy * speed));

        const newC = Math.round(this.col);
        const newR = Math.round(this.row);
        if (newC !== oldC || newR !== oldR) {
          const src = hogPositions[oldC][oldR];
          const idx = src.indexOf(this);
          if (idx !== -1) src.splice(idx, 1);
          hogPositions[newC][newR].push(this);
        }
      }

      potentialDeath(deltaDay) {
        const c = Math.round(this.col);
        const r = Math.round(this.row);
        const a = agriculture[c][r];

        // Fat change: ag=0 → −MAX/day, ag=0.5 → neutral, ag=1 → +MAX/day
        this.fatness = Math.max(0, Math.min(1,
          this.fatness + (a - 0.5) * 2 * MAX_FAT_CHANGE * deltaDay
        ));

        // Starvation death (fat hit 0)
        if (this.fatness <= 0) { this.die(); return; }

        // Background natural death, tuned to yield MAX_BIRTH_DEATH_RATIO at ideal conditions
        if (Math.random() < NATURAL_DEATH_RATE * deltaDay) { this.die(); }
      }

      reproduce(deltaDay) {
        if (hogs.length >= MAX_HOGS) return;
        if (Math.random() < BIRTH_RATE * deltaDay) {
          const child = new Hog({ x: Math.round(this.col), y: Math.round(this.row) });
          // Child fat: average of parent and 0.5 (regression toward mean)
          child.fatness = Math.min(1, (this.fatness + 0.5) / 2);
        }
      }

      die() {
        const c = Math.round(this.col);
        const r = Math.round(this.row);
        const arr = hogPositions[c][r];
        const ai = arr.indexOf(this);
        if (ai !== -1) arr.splice(ai, 1);
        const hi = hogs.indexOf(this);
        if (hi !== -1) hogs.splice(hi, 1);
      }
    }

    // ─────────────────────────────────────────────────────────────
    // THREE.JS SETUP
    // ─────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0f);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, -12, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    // ─────────────────────────────────────────────────────────────
    // INITIALIZE GRIDS
    // ─────────────────────────────────────────────────────────────
    hogPositions = Array.from({ length: SEGMENTS_X + 1 },
      () => Array.from({ length: SEGMENTS_Y + 1 }, () => []));

    // Agriculture: sum of random cosine waves → normalise to [0, 1]
    agriculture = Array.from({ length: SEGMENTS_X + 1 }, () => new Float32Array(SEGMENTS_Y + 1));
    for (let w = 0; w < 8; w++) {
      const fx    = (Math.random() - 0.5) * 0.18;
      const fy    = (Math.random() - 0.5) * 0.18;
      const phase = Math.random() * Math.PI * 2;
      for (let c = 0; c <= SEGMENTS_X; c++)
        for (let r = 0; r <= SEGMENTS_Y; r++)
          agriculture[c][r] += Math.cos(c * fx + r * fy + phase);
    }
    let agMin = Infinity, agMax = -Infinity;
    for (let c = 0; c <= SEGMENTS_X; c++)
      for (let r = 0; r <= SEGMENTS_Y; r++) {
        if (agriculture[c][r] < agMin) agMin = agriculture[c][r];
        if (agriculture[c][r] > agMax) agMax = agriculture[c][r];
      }
    const agRange = agMax - agMin || 1;
    for (let c = 0; c <= SEGMENTS_X; c++)
      for (let r = 0; r <= SEGMENTS_Y; r++)
        agriculture[c][r] = (agriculture[c][r] - agMin) / agRange;

    // Precompute agriculture gradients once (central differences) — static field
    agGradX = Array.from({ length: SEGMENTS_X + 1 }, () => new Float32Array(SEGMENTS_Y + 1));
    agGradY = Array.from({ length: SEGMENTS_X + 1 }, () => new Float32Array(SEGMENTS_Y + 1));
    for (let c = 0; c <= SEGMENTS_X; c++)
      for (let r = 0; r <= SEGMENTS_Y; r++) {
        agGradX[c][r] = agriculture[Math.min(c+1,SEGMENTS_X)][r] - agriculture[Math.max(c-1,0)][r];
        agGradY[c][r] = agriculture[c][Math.min(r+1,SEGMENTS_Y)] - agriculture[c][Math.max(r-1,0)];
      }

    // toAvoid: all zeros for now; set values whenever you have hotspots
    toAvoid = Array.from({ length: SEGMENTS_X + 1 }, () => new Float32Array(SEGMENTS_Y + 1));

    // ─────────────────────────────────────────────────────────────
    // GEOMETRY
    // ─────────────────────────────────────────────────────────────
    const geometry = new THREE.PlaneGeometry(PLANE_WIDTH, PLANE_HEIGHT, SEGMENTS_X, SEGMENTS_Y);
    const positions = geometry.attributes.position;
    const colorData = new Float32Array(positions.count * 3);

    // Z = hog density, scaled so even dense clusters stay reasonable
    function getZ(col, row) {
      return hogPositions[col][row].length * 0.4;
    }

    // Red (ag=0) → yellow (ag=0.5) → green (ag=1)
    function getColor(col, row) {
      const a = agriculture[col][row];
      return [
        a < 0.5 ? 1.0 : 2.0 * (1.0 - a),
        a < 0.5 ? 2.0 * a : 1.0,
        0.0
      ];
    }

    // Spawn initial hogs uniformly distributed across the grid
    for (let i = 0; i < INITIAL_HOGS; i++) {
      new Hog({
        x: Math.floor(Math.random() * (SEGMENTS_X + 1)),
        y: Math.floor(Math.random() * (SEGMENTS_Y + 1))
      });
    }

    // Initial geometry pass
    {
      let col = 0, row = 0;
      for (let i = 0; i < positions.count; i++) {
        positions.setZ(i, getZ(col, row));
        const [r, g, b] = getColor(col, row);
        colorData[i * 3] = r; colorData[i * 3 + 1] = g; colorData[i * 3 + 2] = b;
        if (++col > SEGMENTS_X) { col = 0; row++; }
      }
    }
    positions.needsUpdate = true;
    geometry.computeVertexNormals();
    geometry.setAttribute('color', new THREE.BufferAttribute(colorData, 3));

    scene.add(new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({
      vertexColors: true, side: THREE.DoubleSide, shininess: 60
    })));
    scene.add(new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({
      color: 0xffffff, wireframe: true, transparent: true, opacity: 0.04
    })));

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(5, 5, 10);
    scene.add(sun);
    const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
    fill.position.set(-5, -5, -5);
    scene.add(fill);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─────────────────────────────────────────────────────────────
    // RENDER LOOP
    // ─────────────────────────────────────────────────────────────
    const hogCountEl = document.getElementById('hogCount');
    let lastTime = 0;

    function animate(timestamp) {
      requestAnimationFrame(animate);

      const elapsed = timestamp - lastTime;
      if (elapsed < 1000 / TARGET_FPS) return;
      lastTime = timestamp - (elapsed % (1000 / TARGET_FPS));

      const deltaDay = elapsed / DAY_DURATION;

      // Phase 1: compute all directions from the same snapshot
      // (prevents mid-step contamination from simultaneous moves)
      const snapshot = hogs.slice();
      for (const hog of snapshot) hog.calculateDirection();

      // Phase 2: move
      for (const hog of snapshot) hog.move(deltaDay);

      // Phase 3: vital events (re-slice because die() mutates hogs[])
      for (const hog of hogs.slice()) hog.potentialDeath(deltaDay);
      for (const hog of hogs.slice()) hog.reproduce(deltaDay);

      // Phase 4: update geometry
      let col = 0, row = 0;
      for (let i = 0; i < positions.count; i++) {
        positions.setZ(i, getZ(col, row));
        const [r, g, b] = getColor(col, row);
        colorData[i * 3] = r; colorData[i * 3 + 1] = g; colorData[i * 3 + 2] = b;
        if (++col > SEGMENTS_X) { col = 0; row++; }
      }
      positions.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;
      geometry.computeVertexNormals();

      hogCountEl.textContent = hogs.length;
      controls.update();
      renderer.render(scene, camera);
    }

    animate(0);
  </script>
</body>
</html>
